services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cs-manager-backend
    restart: unless-stopped
    volumes:
      - app-data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:///./data/chirpstack_manager.db
      - CORS_ORIGINS=["http://localhost:4000","http://localhost"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: cs-manager-frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app-data:
